<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Current Eye Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
  text-align: center;
}

.container {
  margin-top: 80px;
}

input {
  padding: 10px;
  margin: 10px;
  width: 200px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #38bdf8;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>⚡ Current Eye Pro</h1>

<div class="container">

<form action="/check" method="post">

    <input name="input_current" placeholder="Input Current" required><br>
    <input name="output_current" placeholder="Output Current" required><br>
    <input name="temperature" placeholder="Temperature" required><br>

    <button type="submit">Check System</button>

</form>

</div>

</body>
</html>
