<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Eye Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
}

#loginPage {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #020617;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #38bdf8;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#dashboard { display: none; }

header {
  background: #020617;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  color: #38bdf8;
}

.container { padding: 20px; }

.card {
  background: #1e293b;
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
  display: inline-block;
  width: 200px;
  text-align: center;
}

.value { font-size: 22px; font-weight: bold; }

.green { color: #22c55e; }
.red { color: #ef4444; }
.orange { color: #f97316; }

.section { margin-top: 30px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>🔐 Login</h2>
    <input type="text" id="mobile" placeholder="Mobile Number">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="loginMsg"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<header>⚡ Current Eye - Smart Monitoring</header>

<div class="container">

<h2>📊 Live Dashboard</h2>

<div class="card"><h3>Voltage</h3><div class="value" id="voltage">--</div></div>

<div class="card"><h3>Input Current</h3><div class="value" id="inputCurrent">--</div></div>

<div class="card"><h3>Output Current</h3><div class="value" id="outputCurrent">--</div></div>

<div class="card"><h3>Temperature</h3><div class="value" id="temp">--</div></div>

<div class="card"><h3>Status</h3><div class="value" id="status">Waiting...</div></div>

<br>
<button onclick="simulate()">🔄 Simulate</button>

<div class="section">
<h2>📞 Emergency Contact</h2>
<p>EB Officer: +91 9876543210</p>
</div>

<div class="section">
<h2>🚨 Alert Message</h2>
<p id="alertMsg">No Alerts</p>
</div>

</div>
</div>

<script>

// LOGIN
function login() {
  let m = document.getElementById("mobile").value;
  let p = document.getElementById("password").value;

  if (m === "1234567890" && p === "admin") {
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    document.getElementById("loginMsg").innerText = "Invalid Login!";
  }
}

// BEEP
function playBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.setValueAtTime(1000, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 300);
}

// SMS DISPLAY
function sendSMS(msg) {
  document.getElementById("alertMsg").innerText =
    "📱 SMS Sent: " + msg;
}

// SIMULATION
function simulate() {

  let voltage = 220 + Math.floor(Math.random() * 20);

  let inputCurrent = 20 + Math.floor(Math.random() * 50);
  let outputCurrent = 10 + Math.floor(Math.random() * 40);

  let temp = 30 + Math.floor(Math.random() * 50);

  document.getElementById("voltage").innerText = voltage + " V";
  document.getElementById("inputCurrent").innerText = inputCurrent + " A";
  document.getElementById("outputCurrent").innerText = outputCurrent + " A";
  document.getElementById("temp").innerText = temp + " °C";

  let status = document.getElementById("status");

  let currentDiff = inputCurrent - outputCurrent;

  // ⚠️ THEFT
  if (currentDiff > 15) {
    status.innerText = "⚠️ Theft Detected";
    status.className = "value red";

    let msg = "⚠️ Theft Detected (Current Difference High)";
    playBeep();
    alert(msg);
    sendSMS(msg);
  }

  // ⚡ OVER CURRENT
  else if (inputCurrent > 55) {
    status.innerText = "⚡ Over Current";
    status.className = "value orange";

    let msg = "⚡ Over Current Detected!";
    playBeep();
    alert(msg);
    sendSMS(msg);
  }

  // 🔥 OVER TEMPERATURE
  else if (temp > 60) {
    status.innerText = "🔥 Over Temperature";
    status.className = "value orange";

    let msg = "🔥 High Temperature Detected!";
    playBeep();
    alert(msg);
    sendSMS(msg);
  }

  // NORMAL
  else {
    status.innerText = "Normal";
    status.className = "value green";
    document.getElementById("alertMsg").innerText = "No Alerts";
  }
}

</script>

</body>
</html>
